        body {
            font-family: "Inter", sans-serif;
            color: #000;
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100dvh;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
            background-color: #000;
        }
        img {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        #app-wrapper {
            display: none;
            width: 100%;
            height: 100%;
        }
        #app-wrapper.unlocked {
            display: block;
        }
        #classic-mode-container {
            width: 100vw;
            height: 100dvh;
            justify-content: center;
            align-items: center;
        }
        #display-area {
            position: relative;
            width: 100vw;
            height: 100vw;
            max-height: 100dvh;
            box-sizing: border-box;
            overflow: hidden;
        }
        #slide-container {
            height: 100%;
            display: flex;
            gap: 20px;
        }
        .slide {
            height: 100%;
            width: 100vw;
            flex-shrink: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide-content {
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
        }
        .slide-content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #history-overlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background-color: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
            text-align: left;
            display: none;
            z-index: 20;
        }
        #history-overlay.show {
            display: block;
        }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-lora { font-family: 'Lora', serif; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        .shake {
            animation: shake 0.4s;
        }

        #passcode-ui {
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            height: 100dvh;
            width: 100vw;
            flex-direction: column;
            position: absolute;
            inset: 0;
            z-index: 10;
        }
        .passcode-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .passcode-title {
            font-size: 20px;
            margin-bottom: 24px;
            font-weight: 400;
            letter-spacing: -0.2px;
        }
        .passcode-dots {
            display: flex;
            gap: 22px;
            margin-bottom: 60px;
        }
        .passcode-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #ffffff;
            transition: background-color 0.2s ease;
        }
        .passcode-dot.filled {
            background-color: #ffffff;
            transition: none;
        }
        .passcode-numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px 26px;
        }
        .passcode-btn {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        .passcode-btn.pressed {
            background: rgba(255, 255, 255, 0.3);
            transition: none;
        }
        .passcode-btn .number {
            font-size: 36px;
            font-weight: 400;
            line-height: 1;
        }
        .passcode-btn.has-letters .number {
            margin-top: -4px;
        }
        .passcode-btn .letters {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }
        .passcode-empty {
            visibility: hidden;
        }
        .passcode-footer {
            display: flex;
            justify-content: space-between;
            padding: 0 32px 36px 32px;
            font-size: 16px;
            font-weight: 400;
        }
        .passcode-footer-btn {
            color: white;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.9;
            transition: opacity 0.3s ease;
            touch-action: none;
        }
        .passcode-footer-btn.pressed {
            opacity: 0.5;
            transition: none;
        }
        #lockscreen-image-view {
            width: 100vw;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            inset: 0;
            z-index: 5;
            background-color: #000;
        }
        #lockscreen-image-wrapper {
            width: 100vw;
            height: 100vw;
            max-height: 100dvh;
            background-color: #fff;
            position: relative;
        }
        #lockscreen-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>

        let currentAppMode = 'classic';
        let currentTransitionDelay = 3;
        let inputPasscodeLength = 0;
        let isProcessingPasscode = false;
        let currentPasscodeInput = [];

        const SWIPE_THRESHOLD = 50, TAP_THRESHOLD = 10, DOUBLE_TAP_TIMEOUT = 300;
        const TAP_HOLD_DURATION = 500, TOTAL_SLIDES = 4, SLIDE_GAP = 20;
        const gridToGesture = { 'a': 'A', 'b': 'B', 'c': 'C', 'd': 'D', 'e': 'E' };
        const gestureToCode = { 'A': 'Fl', 'B': 'uC', 'C': 'zW', 'D': 'Xy', 'E': 'Qr' };

        const showLicenseModal = () => { licenseModal.style.display = 'flex'; appWrapper.classList.remove('unlocked'); };
        
        const showToastsIfNeeded = () => { 
            if (!localStorage.getItem('atmaSettingsToastShown')) { 
                settingsToast.classList.remove('hidden'); 
                localStorage.setItem('atmaSettingsToastShown', 'true'); 
            }
            if (!localStorage.getItem('atmaFeatureLockscreenShown')) {
                featureToast.classList.remove('hidden');
            }
        };
        
        const unlockApp = () => {
            licenseModal.style.display = 'none';
            appWrapper.classList.add('unlocked');
            loadSettings();
            showToastsIfNeeded();
        };

        const setButtonLoading = (isLoading) => {
            const buttonContent = verifyLicenseBtn.querySelector('span');
            const spinner = verifyLicenseBtn.querySelector('.spinner');
            if (isLoading) {
                buttonContent.style.display = 'none';
                if (!spinner) {
                    const newSpinner = document.createElement('div');
                    newSpinner.className = 'spinner';
                    verifyLicenseBtn.appendChild(newSpinner);
                }
            } else {
                buttonContent.style.display = 'inline';
                if (spinner) spinner.remove();
            }
        };

        const verifyLicense = async () => {
            const key = licenseKeyInput.value.trim().toUpperCase();
            if (!key) { licenseError.textContent = 'Please enter a license key.'; return; }
            setButtonLoading(true);
            licenseError.textContent = '';
            try {
                const availableLicenseRef = doc(db, 'availableLicenses', key);
                const licenseSnap = await getDoc(availableLicenseRef);
                if (licenseSnap.exists() && licenseSnap.data().status === 'available') {
                    const originalData = licenseSnap.data();
                    const activatedLicenseRef = doc(db, 'activatedLicenses', key);
                    await setDoc(activatedLicenseRef, { ...originalData, status: 'used', uid: auth.currentUser.uid, claimedAt: serverTimestamp() });
                    await deleteDoc(availableLicenseRef);
                    localStorage.setItem('atmaLicense', JSON.stringify({ key: key, lastValidated: new Date().getTime() }));
                    unlockApp();
                } else {
                    licenseError.textContent = 'Invalid or already used license key.';
                }
            } catch (error) {
                licenseError.textContent = 'Verification failed. Please try again.';
            } finally {
                setButtonLoading(false);
            }
        };
        
        const checkLicenseOnLoad = async () => {
            const licenseDataString = localStorage.getItem('atmaLicense');
            if (!licenseDataString) { showLicenseModal(); return; }
            const licenseData = JSON.parse(licenseDataString);
            const sevenDaysInMillis = 7 * 24 * 60 * 60 * 1000;
            if ((new Date().getTime() - licenseData.lastValidated) < sevenDaysInMillis) { unlockApp(); return; }
            try {
                const licenseRef = doc(db, 'activatedLicenses', licenseData.key);
                const licenseSnap = await getDoc(licenseRef);
                if (licenseSnap.exists() && licenseSnap.data().uid === auth.currentUser.uid) {
                    licenseData.lastValidated = new Date().getTime();
                    localStorage.setItem('atmaLicense', JSON.stringify(licenseData));
                    unlockApp();
                } else {
                    localStorage.removeItem('atmaLicense');
                    showLicenseModal();
                    licenseError.textContent = 'License re-validation failed.';
                }
            } catch (error) {
                unlockApp();
            }
        };

        window.onload = () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    checkLicenseOnLoad();
                } else {
                    signInAnonymously(auth).catch(() => {
                        showLicenseModal();
                        licenseError.textContent = "Could not connect to authentication service.";
                    });
                }
            });
        };

        verifyLicenseBtn.addEventListener('click', verifyLicense);
        licenseKeyInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') verifyLicense(); });
        
        closeToastBtn.addEventListener('click', () => settingsToast.classList.add('hidden'));
        closeFeatureBtn.addEventListener('click', () => {
            featureToast.classList.add('hidden');
            localStorage.setItem('atmaFeatureLockscreenShown', 'true');
        });

        window.onresize = () => { if (appWrapper.classList.contains('unlocked') && currentAppMode === 'classic') animateToSlide(currentSlideIndex); };
        
        function lockIdInputUI() {
            customIdInput.value = customId;
            customIdInput.readOnly = true;
            customIdInput.classList.add('bg-gray-200', 'cursor-not-allowed');
            changeIdBtn.classList.remove('hidden');
            idActionsContainer.style.display = 'flex';
            oldIdToReplace = null; 
        }

        function unlockIdInputUIForCreation() {
            customIdInput.value = '';
            customIdInput.readOnly = false;
            customIdInput.classList.remove('bg-gray-200', 'cursor-not-allowed');
            changeIdBtn.classList.add('hidden');
            idActionsContainer.style.display = 'none';
            oldIdToReplace = null;
        }

        function unlockIdInputUIForChange() {
            oldIdToReplace = customId; 
            customIdInput.readOnly = false;
            customIdInput.classList.remove('bg-gray-200', 'cursor-not-allowed');
            customIdInput.focus();
            changeIdBtn.classList.add('hidden');
            idActionsContainer.style.display = 'flex';
        }
        
        function updateSaveButtonState() {
            const t = translations[currentLanguage];
            const selectedLang = langIdButton.classList.contains('bg-black') ? 'id' : 'eng';
            const selectedMode = appModeSelect.value;
            const selectedDelay = parseInt(transitionDelayInput.value, 10);
            
            let idChanged = false;
            if (!customIdInput.readOnly) {
                idChanged = customIdInput.value !== customId;
            }

            if (selectedLang !== initialSettings.lang || idChanged || selectedMode !== initialSettings.mode || selectedDelay !== initialSettings.delay) {
                saveSettingsBtn.textContent = t.saveAndCloseBtn;
            } else {
                saveSettingsBtn.textContent = t.closeBtn;
            }
        }

        function resetDeleteButtonState() {
            if (deleteConfirmationTimeout) {
                clearTimeout(deleteConfirmationTimeout);
                deleteConfirmationTimeout = null;
            }
            deleteIdBtn.classList.remove('bg-red-900');
            deleteIdBtn.classList.add('bg-red-700');
            deleteIdBtn.textContent = translations[currentLanguage].deleteIdBtn;
        }

        async function openSettingsModal() {
            initialSettings = {
                lang: currentLanguage,
                id: customId,
                mode: currentAppMode,
                delay: currentTransitionDelay
            };
            
            appModeSelect.value = currentAppMode;
            transitionDelayInput.value = currentTransitionDelay;
            delaySettingContainer.style.display = currentAppMode === 'lockscreen' ? 'block' : 'none';

            updateLanguageUI(currentLanguage);
            updateStatus.textContent = '';
            
            if (customId) lockIdInputUI();
            else unlockIdInputUIForCreation();

            customIdError.textContent = '';
            resetDeleteButtonState();
            settingsModal.classList.remove('hidden');
        }

        function closeSettingsModal() { 
            if (!customId) {
                customIdError.textContent = translations[currentLanguage].mustSetId;
                return;
            }
            resetDeleteButtonState();
            oldIdToReplace = null;
            settingsModal.classList.add('hidden'); 
            customIdError.textContent = '';
        }

        function updateLanguageUI(lang) {
            currentLanguage = lang;
            const t = translations[lang];

            licenseModal.querySelector('h2').textContent = t.licenseActivation;
            licenseModal.querySelector('p').textContent = t.licensePrompt;
            verifyLicenseBtn.querySelector('span').textContent = t.activateBtn;
            settingsToastText.textContent = t.settingsTip;
            settingsTitle.textContent = t.settingsTitle;
            customIdLabel.textContent = t.customIdLabel;
            customIdDesc.textContent = t.customIdPrompt;
            changeIdBtn.textContent = t.changeIdBtn;
            downloadQrBtn.textContent = t.downloadQrBtn;
            languageLabel.textContent = t.languageLabel;
            readInstructionsButton.textContent = t.readInstructions;
            langIdButton.textContent = t.langId;
            langEngButton.textContent = t.langEng;
            appModeLabel.textContent = t.appModeLabel;
            transitionDelayLabel.textContent = t.transitionDelayLabel;
            appModeSelect.options[0].text = t.modeClassic;
            appModeSelect.options[1].text = t.modeLockscreen;
            updateAppBtn.querySelector('span').textContent = t.checkUpdateBtn;
            
            if (lang === 'id') {
                 langIdButton.className = 'font-playfair flex-1 p-2 rounded-sm border-2 uppercase tracking-wider border-black bg-black text-[#fdfaf3]';
                 langEngButton.className = 'font-playfair flex-1 p-2 rounded-sm border-2 uppercase tracking-wider border-black bg-transparent text-black';
            } else {
                 langEngButton.className = 'font-playfair flex-1 p-2 rounded-sm border-2 uppercase tracking-wider border-black bg-black text-[#fdfaf3]';
                 langIdButton.className = 'font-playfair flex-1 p-2 rounded-sm border-2 uppercase tracking-wider border-black bg-transparent text-black';
            }
            updateSaveButtonState();
            resetDeleteButtonState();
        }

        async function saveSettings() {
            const t = translations[currentLanguage];
            if (saveSettingsBtn.textContent === t.closeBtn) {
                closeSettingsModal();
                return;
            }

            resetDeleteButtonState();
            
            const finalLang = langIdButton.classList.contains('bg-black') ? 'id' : 'eng';
            const finalIdInput = customIdInput.value;
            const finalMode = appModeSelect.value;
            let finalDelay = parseInt(transitionDelayInput.value, 10);
            if (isNaN(finalDelay) || finalDelay < 1) finalDelay = 3;

            const needsReset = finalLang !== initialSettings.lang || (finalIdInput !== customId && finalIdInput) || finalMode !== initialSettings.mode || finalDelay !== initialSettings.delay;
            const idChanged = finalIdInput !== customId;
            const isCreating = !customId && finalIdInput;
            const isReplacing = customId && idChanged;

            if (isCreating || isReplacing) {
                if (!/^[0-9]{6}$/.test(finalIdInput)) {
                    customIdError.textContent = t.errorIdDigits;
                    return;
                }
                try {
                    const newDocRef = doc(db, 'printedQR', finalIdInput);
                    const docSnap = await getDoc(newDocRef);
                    if (docSnap.exists()) {
                        customIdError.textContent = t.errorIdTaken;
                        return;
                    }
                    if (isReplacing) {
                        const oldDocRef = doc(db, 'printedQR', customId);
                        await deleteDoc(oldDocRef);
                    }
                    await setDoc(newDocRef, { id: '', lang: finalLang, updatedAt: serverTimestamp() });
                    customId = finalIdInput;
                } catch (error) {
                    customIdError.textContent = t.errorIdUpdateFailed;
                    return;
                }
            } else if (finalLang !== initialSettings.lang && customId) {
                 try {
                      const docRef = doc(db, 'printedQR', customId);
                      await setDoc(docRef, { lang: finalLang }, { merge: true });
                 } catch (error) {}
            }

            currentLanguage = finalLang;
            currentAppMode = finalMode;
            currentTransitionDelay = finalDelay;
            
            localStorage.setItem('atmaSettings', JSON.stringify({ id: customId, lang: currentLanguage, mode: currentAppMode, delay: currentTransitionDelay }));
            closeSettingsModal();
            if (needsReset) resetApp();
        }
        
        function loadSettings() {
            const savedSettings = JSON.parse(localStorage.getItem('atmaSettings')) || {};
            customId = savedSettings.id || '';
            currentLanguage = savedSettings.lang || 'eng';
            currentAppMode = savedSettings.mode || 'classic';
            currentTransitionDelay = savedSettings.delay || 3;
            resetApp();
            if (!customId) openSettingsModal();
        }

        function downloadQrCode() {
            if (!customId) {
                customIdError.textContent = translations[currentLanguage].errorSetIdFirstDownload;
                return;
            }
            window.open(`generateqr.html?id=${customId}`, '_blank');
        }
        
        async function deleteId() {
            const t = translations[currentLanguage];
            const idToDelete = customIdInput.value;
            if (!/^[0-9]{6}$/.test(idToDelete) || idToDelete !== customId) {
                customIdError.textContent = t.errorIdMismatch;
                resetDeleteButtonState();
                return;
            }
             
            if (!deleteConfirmationTimeout) {
                deleteIdBtn.classList.remove('bg-red-700');
                deleteIdBtn.classList.add('bg-red-900');
                deleteIdBtn.textContent = t.confirmDeleteBtn;
                deleteConfirmationTimeout = setTimeout(resetDeleteButtonState, 3000);
                return;
            }

            clearTimeout(deleteConfirmationTimeout);
            
            try {
                const docRef = doc(db, 'printedQR', idToDelete);
                await deleteDoc(docRef);
                customIdError.textContent = t.idDeletedSuccess.replace('{id}', idToDelete);
                customId = '';
                localStorage.setItem('atmaSettings', JSON.stringify({ id: '', lang: currentLanguage, mode: currentAppMode, delay: currentTransitionDelay }));
                unlockIdInputUIForCreation();
                updateSaveButtonState();
            } catch (error) {
                customIdError.textContent = t.errorIdDeleteFailed;
            } finally {
                resetDeleteButtonState();
            }
        }

        appModeSelect.addEventListener('change', (e) => {
            delaySettingContainer.style.display = e.target.value === 'lockscreen' ? 'block' : 'none';
            updateSaveButtonState();
        });
        transitionDelayInput.addEventListener('input', updateSaveButtonState);
        langIdButton.addEventListener('click', () => updateLanguageUI('id'));
        langEngButton.addEventListener('click', () => updateLanguageUI('eng'));
        changeIdBtn.addEventListener('click', unlockIdInputUIForChange);
        saveSettingsBtn.addEventListener('click', saveSettings);
        downloadQrBtn.addEventListener('click', downloadQrCode);
        deleteIdBtn.addEventListener('click', deleteId);
        customIdInput.addEventListener('input', updateSaveButtonState);
        
        updateAppBtn.addEventListener('click', async () => {
            const btnSpan = updateAppBtn.querySelector('span');
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            btnSpan.style.display = 'none';
            updateAppBtn.appendChild(spinner);
            updateStatus.textContent = '';
            
            try {
                const res = await fetch(window.location.href, { cache: 'no-store' });
                const newSourceCode = await res.text();
                
                if (originalSourceCode && newSourceCode !== originalSourceCode) {
                    updateStatus.textContent = translations[currentLanguage].updateCompleted;
                    if ('serviceWorker' in navigator) {
                        const registrations = await navigator.serviceWorker.getRegistrations();
                        for (let registration of registrations) {
                            await registration.unregister();
                        }
                    }
                    setTimeout(() => {
                        window.location.reload(true);
                    }, 1000);
                } else {
                    updateStatus.textContent = translations[currentLanguage].upToDate;
                    spinner.remove();
                    btnSpan.style.display = 'inline';
                }
            } catch (err) {
                spinner.remove();
                btnSpan.style.display = 'inline';
                updateStatus.textContent = 'Failed to check update.';
            }
        });

        settingsModal.addEventListener('click', (e) => { 
            if (e.target === settingsModal) { 
                if (currentLanguage !== initialSettings.lang) updateLanguageUI(initialSettings.lang);
                closeSettingsModal(); 
            }
        });
        
        invisibleSettingsTrigger.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            resetApp();
            openSettingsModal();
        });
        invisibleSettingsTrigger.addEventListener('mousedown', (e) => {
            resetApp();
            openSettingsModal();
        });

        async function updatePerformingStatus(isPerforming) {
            if (!customId || !auth.currentUser) return;
            try {
                const docRef = doc(db, 'printedQR', customId);
                await setDoc(docRef, { isPerforming: isPerforming, updatedAt: serverTimestamp() }, { merge: true });
            } catch (error) {}
        }

        function createSlide(slideIndex) {
            const slide = document.createElement('div');
            slide.className = 'slide';
            const slideContent = document.createElement('div');
            slideContent.className = 'slide-content';

            if (slideIndex < 3) {
                const contentData = displayContent[currentLanguage][slideIndex];
                const listItems = contentData.items.map(item => `<li class="ml-4 text-xl">• ${item}</li>`).join('');
                slideContent.innerHTML = `
                    <div class="text-left w-full h-full flex flex-col justify-center">
                        <h2 class="text-3xl font-bold mb-4">${contentData.title}</h2>
                        <ul class="list-none space-y-2">${listItems}</ul>
                    </div>`;
            } else {
                slideContent.style.padding = '0';
                slideContent.innerHTML = `<img src="https://cnid.my.id/image1.jpg">`;
            }
            slide.appendChild(slideContent);
            return slide;
        }
        
        function animateToSlide(slideIndex, isInstant = false) {
            const previousSlideIndex = currentSlideIndex;
            const transitionDuration = isInstant ? 0 : 400;
            slideContainer.style.transition = isInstant ? 'none' : `transform ${transitionDuration / 1000}s ease-in-out`;
            const slideWidth = displayArea.getBoundingClientRect().width;
            const totalTranslation = (slideWidth * slideIndex) + (SLIDE_GAP * slideIndex);
            slideContainer.style.transform = `translateX(-${totalTranslation}px)`;
            currentSlideIndex = slideIndex;
            
            if (!isSessionActive && !isImageRevealed && previousSlideIndex === 3 && currentSlideIndex !== 3) {
                const lastSlideContent = slideContainer.children[3].querySelector('.slide-content');
                if(lastSlideContent) {
                    setTimeout(function() {
                        lastSlideContent.innerHTML = `<img src="https://cnid.my.id/image2.jpg">`;
                        isImageRevealed = true;
                    }, transitionDuration);
                }
            }
        }

        function setupInitialView() {
            slideContainer.innerHTML = '';
            for(let i = 0; i < TOTAL_SLIDES; i++) {
                slideContainer.appendChild(createSlide(i));
            }
            animateToSlide(0, true);
        }
        
        function resetApp() {
            gestureCount = 0;
            currentSlideIndex = 0;
            gestureSequence.length = 0;
            rawGestures.length = 0;
            currentPasscodeInput = [];
            isSessionActive = true;
            tapCount = 0;
            lastTapTime = 0;
            isImageRevealed = false;
            
            updateLanguageUI(currentLanguage);

            if (currentAppMode === 'classic') {
                classicModeContainer.style.display = 'flex';
                passcodeUi.style.display = 'none';
                lockscreenImageView.style.display = 'none';
                setupInitialView();
            } else {
                classicModeContainer.style.display = 'none';
                lockscreenImageView.style.display = 'none';
                passcodeUi.style.display = 'flex';
                
                inputPasscodeLength = 0;
                isProcessingPasscode = false;
                passcodeDots.forEach(dot => dot.classList.remove('filled'));
            }

            if (customId) {
                updatePerformingStatus(true);
            }
        }

        function runLockscreenTransition() {
            passcodeUi.style.display = 'none';
            lockscreenImageView.style.display = 'flex';
            lockscreenImg.style.opacity = 1;
            lockscreenImg.src = 'https://cnid.my.id/image1.jpg';

            setTimeout(() => {
                lockscreenImg.style.opacity = 0;
                setTimeout(() => {
                    lockscreenImg.src = 'https://cnid.my.id/image2.jpg';
                    lockscreenImg.style.opacity = 1;
                }, 500);
            }, currentTransitionDelay * 1000);
        }
        
        async function updateGestureDataInFirestore() {
            if (!customId || !auth.currentUser) return;
            try {
                const docRef = doc(db, 'printedQR', customId);
                const dataToSave = { id: gestureSequence.join(''), lang: currentLanguage, updatedAt: serverTimestamp() };
                await setDoc(docRef, dataToSave, { merge: true }); 
            } catch (error) {}
        }

        function showHistoryOverlay() {
            if (rawGestures.length === 0) {
                historyOverlayElement.innerHTML = `<ul><li>${translations[currentLanguage].noHistory}</li></ul>`;
            } else {
                const gestureToIndex = { 'A': 0, 'B': 1, 'D': 2, 'C': 3, 'E': 4 };
                const historyHtml = `<ul>${rawGestures.map((gesture, i) => {
                    const itemIndex = gestureToIndex[gesture];
                    const itemText = displayContent[currentLanguage][i].items[itemIndex];
                    return `<li class="mb-1">${itemText}</li>`;
                }).join('')}</ul>`;
                historyOverlayElement.innerHTML = historyHtml;
            }
            historyOverlayElement.classList.add('show');
        }

        function hideHistoryOverlay() { historyOverlayElement.classList.remove('show'); }

        function getGridArea(clientX, clientY) {
            const rect = displayArea.getBoundingClientRect();
            if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) return null;
            const localX = clientX - rect.left;
            const localY = clientY - rect.top;
            const centerXStart = rect.width * 0.25, centerXEnd = rect.width * 0.75;
            const centerYStart = rect.height * 0.25, centerYEnd = rect.height * 0.75;
            if (localX > centerXStart && localX < centerXEnd && localY > centerYStart && localY < centerYEnd) return 'e';
            const midX = rect.width / 2, midY = rect.height / 2;
            if (localX < midX && localY < midY) return 'a';
            if (localX >= midX && localY < midY) return 'b';
            if (localX < midX && localY >= midY) return 'c';
            if (localX >= midX && localY >= midY) return 'd';
            return null;
        }

        function handlePasscodePress(e) {
            if (e.type === 'touchstart') e.preventDefault();
            e.stopPropagation();
            this.classList.add('pressed');
            
            if (isProcessingPasscode) return;

            const digit = this.querySelector('.number').textContent;
            const digitToGesture = { '1':'A', '2':'B', '3':'D', '4':'C', '5':'E' };
            
            if (inputPasscodeLength < 4) {
                passcodeDots[inputPasscodeLength].classList.add('filled');
                currentPasscodeInput.push(digit);

                if (inputPasscodeLength < 3) {
                    const mappedGesture = digitToGesture[digit];
                    if (mappedGesture) {
                        const gestureCode = gestureToCode[mappedGesture];
                        gestureSequence.push(gestureCode);
                        rawGestures.push(mappedGesture);
                        gestureCount++;
                    }
                }
                inputPasscodeLength++;
            }
            
            if (inputPasscodeLength === 4) {
                isProcessingPasscode = true;
                const isInvalid = currentPasscodeInput.slice(0, 3).some(d => !['1', '2', '3', '4', '5'].includes(d));

                setTimeout(() => {
                    if (isInvalid) {
                        const dotsContainer = document.querySelector('.passcode-dots');
                        dotsContainer.classList.add('shake');
                        
                        setTimeout(() => {
                            dotsContainer.classList.remove('shake');
                            passcodeDots.forEach(dot => dot.classList.remove('filled'));
                            inputPasscodeLength = 0;
                            currentPasscodeInput = [];
                            gestureSequence.length = 0;
                            rawGestures.length = 0;
                            gestureCount = 0;
                            isProcessingPasscode = false;
                        }, 400);
                    } else {
                        passcodeDots.forEach(dot => dot.classList.remove('filled'));
                        inputPasscodeLength = 0;
                        currentPasscodeInput = [];
                        isProcessingPasscode = false;
                        isSessionActive = false;
                        updateGestureDataInFirestore();
                        runLockscreenTransition();
                    }
                }, 50);
            }
        }

        function handlePasscodeRelease(e) {
            e.stopPropagation();
            this.classList.remove('pressed');
        }

        passcodeButtons.forEach(btn => {
            btn.addEventListener('touchstart', handlePasscodePress, { passive: false });
            btn.addEventListener('mousedown', handlePasscodePress);
            btn.addEventListener('touchend', handlePasscodeRelease);
            btn.addEventListener('touchcancel', handlePasscodeRelease);
            btn.addEventListener('mouseup', handlePasscodeRelease);
            btn.addEventListener('mouseleave', handlePasscodeRelease);
        });

        passcodeFooterBtns.forEach(btn => {
            btn.addEventListener('touchstart', function(e) { if(e.type==='touchstart') e.preventDefault(); e.stopPropagation(); this.classList.add('pressed'); }, { passive: false });
            btn.addEventListener('mousedown', function(e) { e.stopPropagation(); this.classList.add('pressed'); });
            btn.addEventListener('touchend', function(e) { e.stopPropagation(); this.classList.remove('pressed'); });
            btn.addEventListener('touchcancel', function(e) { e.stopPropagation(); this.classList.remove('pressed'); });
            btn.addEventListener('mouseup', function(e) { e.stopPropagation(); this.classList.remove('pressed'); });
            btn.addEventListener('mouseleave', function(e) { e.stopPropagation(); this.classList.remove('pressed'); });
        });

        touchArea.addEventListener('touchstart', (e) => {
            if (!appWrapper.classList.contains('unlocked') || e.target.closest('#settings-modal')) return;
            
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;

            if (currentAppMode === 'lockscreen' && isSessionActive) return;

            if (isSessionActive) {
                startArea = getGridArea(startX, startY);
            } else {
                isDragging = false;
                slideContainer.style.transition = 'none';
                const slideWidth = displayArea.getBoundingClientRect().width;
                initialTranslate = -((slideWidth * currentSlideIndex) + (SLIDE_GAP * currentSlideIndex));
                tapHoldTimeout = setTimeout(showHistoryOverlay, TAP_HOLD_DURATION);
            }
        }, { passive: false });

        touchArea.addEventListener('touchmove', (e) => {
            if (!appWrapper.classList.contains('unlocked') || e.target.closest('#settings-modal')) return;
            if (currentAppMode === 'lockscreen' && isSessionActive) return;
            
            if (!isSessionActive) {
                const currentX = e.touches[0].clientX;
                const diffX = currentX - startX;
                if (Math.abs(diffX) > TAP_THRESHOLD) {
                    isDragging = true;
                    if (tapHoldTimeout) clearTimeout(tapHoldTimeout);
                }
                if (isDragging) {
                    slideContainer.style.transform = `translateX(${initialTranslate + diffX}px)`;
                }
            }
        }, { passive: false });

        touchArea.addEventListener('touchend', (e) => {
            if (!appWrapper.classList.contains('unlocked') || e.target.closest('#settings-modal')) return;
            if (currentAppMode === 'lockscreen' && isSessionActive) return;

            if (tapHoldTimeout) clearTimeout(tapHoldTimeout);
            hideHistoryOverlay();

            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = endX - startX;
            const absDiffX = Math.abs(diffX);
            const absDiffY = Math.abs(endY - startY);
            const isTap = absDiffX < TAP_THRESHOLD && absDiffY < TAP_THRESHOLD;

            if (!isSessionActive) {
                if (isTap) {
                    const currentTime = new Date().getTime();
                    tapCount = (currentTime - lastTapTime < DOUBLE_TAP_TIMEOUT) ? tapCount + 1 : 1;
                    lastTapTime = currentTime;
                    
                    if (tapCount === 2) {
                        if (customId) updatePerformingStatus(false);
                    } else if (tapCount === 3) {
                        resetApp();
                    }
                } else if (currentAppMode === 'classic') {
                    if (absDiffX > SWIPE_THRESHOLD) {
                        let newSlideIndex = currentSlideIndex;
                        if (diffX < 0 && currentSlideIndex < TOTAL_SLIDES - 1) newSlideIndex++;
                        else if (diffX > 0 && currentSlideIndex > 0) newSlideIndex--;
                        animateToSlide(newSlideIndex);
                    } else {
                        animateToSlide(currentSlideIndex);
                    }
                }
                isDragging = false;
                return;
            }

            if (!customId) {
                const originalText = settingsToastText.textContent;
                settingsToastText.textContent = 'Please set a Custom ID in settings first.';
                settingsToast.classList.remove('hidden');
                setTimeout(() => {
                    settingsToast.classList.add('hidden');
                    settingsToastText.textContent = originalText;
                }, 3000);
                return;
            }

            let detectedGesture = '';
            if (!isTap && startArea && diffX < -SWIPE_THRESHOLD && absDiffX > absDiffY) {
                detectedGesture = gridToGesture[startArea];
            }
            
            startArea = null;
            if (!detectedGesture) return;

            const gestureCode = gestureToCode[detectedGesture];
            if (gestureCode) {
                gestureSequence.push(gestureCode);
                rawGestures.push(detectedGesture);
                gestureCount++;
                currentSlideIndex++;
                animateToSlide(currentSlideIndex);

                if (gestureCount >= 3) {
                    isSessionActive = false;
                    updateGestureDataInFirestore();
                }
            }
        });

    </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {})
                .catch(error => {});
        });
    }
    </script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="pageTitle"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @font-face {
            font-family: 'CNN Sans Display';
            src: url('fonts/cnn_sans_display-v1.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'CNN Sans Display';
            src: url('fonts/cnn_sans_display-medium-v1.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'CNN Sans Display';
            src: url('fonts/cnn_sans_display-bold-v1.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Serif';
            src: url('fonts/noto_serif-bold-v1.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Serif';
            src: url('fonts/noto_serif-bold_italic-v1.woff2') format('woff2');
            font-weight: 700;
            font-style: italic;
        }
        @font-face {
            font-family: 'Noto Serif Extra Condensed Black';
            src: url('fonts/noto_serif_extra_condensed_black-v1.woff2') format('woff2');
            font-weight: 900;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Sans Arabic';
            src: url('fonts/noto_sans_arabic-v1.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Sans Arabic';
            src: url('fonts/noto_sans_arabic-v1.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Serif Semi Condensed';
            src: url('fonts/noto_serif_semi_condensed-v1.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Helvetica Neue';
            src: url('fonts/helveticaneue-v1.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }

        body {
            font-family: 'CNN Sans Display', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        h1 {
            font-family: 'Noto Serif Extra Condensed Black', serif;
        }

        .article-content p {
            font-family: 'Noto Serif Semi Condensed', serif;
        }

        .article-content h2,
        .article-content h3 {
            font-family: 'Noto Serif', serif;
        }

        .font-semibold {
            font-weight: 500;
        }

        .font-extrabold {
            font-weight: 800;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
        }

        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #007bff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        main {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
        }

        .gallery-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
        }

        .gallery-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .gallery-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            padding-top: 56.25%;
            overflow: hidden;
            background-color: #000;
        }

        .article-image-block img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
            pointer-events: none;
        }

        .gallery-content img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            pointer-events: none;
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            z-index: 2001;
        }

        .cnn-red-bar {
            width: 6px;
            background-color: #CC0000;
            flex-shrink: 0;
        }
        .evidence-figure {
            margin-top: 2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            background-color: #f7fafc;
        }
        .evidence-figure img {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
            display: block;
            pointer-events: none;
        }
        .evidence-figure figcaption {
            margin-top: 0.75rem;
            text-align: center;
            font-size: 0.875rem;
            color: #4a5568;
            font-style: italic;
        }

        #cameraOverlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: auto;
        }
    </style>
</head>

        const cameraOverlay = document.getElementById('cameraOverlay');

        const IMAGE_STATE_KEY = 'smithFamilyImageState';

        let globalQRData = null;

        let activeCameraStream = null;

        const getUrlParams = () => new URLSearchParams(window.location.search);
        const capitalizeFirstLetter = (string) => string ? string.charAt(0).toUpperCase() + string.slice(1) : '';

        function applyTranslations(lang) {
            const t = translations[lang];
            if (!t) return;
            
            const setText = (id, text) => { 
                const el = document.getElementById(id); 
                if (el) {
                    if (id === 'publishedTime') {
                        el.innerHTML = text.replace(',', '<span id="secretComma">,</span>');
                    } else {
                        el.textContent = text; 
                    }
                }
            };
            
            const setHTML = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
            const setPlaceholder = (id, text) => { const el = document.getElementById(id); if (el) el.placeholder = text; };
            
            document.documentElement.lang = t.htmlLang;
            setText('pageTitle', t.title);
            setText('headerWorld', t.headerWorld);
            setText('breadcrumbWorld', t.breadcrumbWorld);
            setText('breadcrumbAmerica', t.breadcrumbAmerica);
            setText('readTime', t.readTime);
            setText('articleTitle', t.articleTitle);
            setText('publishedLabel', t.publishedLabel);
            setText('publishedTime', t.publishedTime);
            setText('authorPrefix', t.authorPrefix);
            setText('authorName', t.authorName);
            setText('imageFigcaption', t.imageFigcaption);
            setText('relatedTitle', t.relatedTitle);
            setText('relatedLink1', t.relatedLink1);
            setText('relatedLink2', t.relatedLink2);
            setText('relatedLink3', t.relatedLink3);
            setPlaceholder('searchPlaceholder', t.searchPlaceholder);
            setText('signIn', t.signIn);
            setText('liveTv', t.liveTv);
            setText('listen', t.listen);
            setText('watch', t.watch);
            setText('world', t.world);
            setText('usPolitics', t.usPolitics);
            setText('business', t.business);
            setText('markets', t.markets);
            setText('health', t.health);
            setText('entertainment', t.entertainment);
            setText('tech', t.tech);
            setText('style', t.style);
            setText('travel', t.travel);
            setText('followCnn', t.followCnn);
            setText('termsOfUse', t.termsOfUse);
            setText('privacyPolicy', t.privacyPolicy);
            setText('cookieSettings', t.cookieSettings);
            setText('adChoices', t.adChoices);
            setText('accessibility', t.accessibility);
            setText('about', t.about);
            setText('newsletters', t.newsletters);
            setText('transcripts', t.transcripts);
            setHTML('copyright', t.copyright);
        }

        function getArticleParams(secretCode, lang) {
            const idParam = secretCode || 'FlFlFl';
            const decodingMap = { 'Fl': 'a', 'uC': 'b', 'zW': 'c', 'Xy': 'd', 'Qr': 'e', 'aA': 'f', 'bB': 'g', 'cC': 'h', 'dD': 'i' };
            let decodedChars = [];
            
            for (let i = 0; i < idParam.length; i += 2) {
                const encodedSegment = idParam.substring(i, i + 2);
                decodedChars.push(decodingMap[encodedSegment] || 'a');
            }
            
            while (decodedChars.length < 3) decodedChars.push('a');
            decodedChars = decodedChars.slice(0, 3);
            const [namaKorbanChar, lokasiChar, alatChar] = decodedChars;

            const victimOptions = {
                'a': 'Eleanor', 'b': 'Abigail', 'c': 'Lillian', 'd': 'Margaret', 'e': 'Beatrice',
                'f': 'Dorothy', 'g': 'Florence', 'h': 'Mildred', 'i': 'Virginia'
            };

            const sceneOptionsId = {
                'a': 'kamar lantai dua', 'b': 'loteng', 'c': 'gudang belakang', 'd': 'ruang bawah tanah',
                'e': 'lorong dekat dapur', 'f': 'perpustakaan', 'g': 'teras samping', 'h': 'garasi tua', 'i': 'ruang makan'
            };

            const sceneOptionsEng = {
                'a': 'the second-floor room', 'b': 'the attic', 'c': 'the back shed', 'd': 'the basement',
                'e': 'the hallway near the kitchen', 'f': 'the library', 'g': 'the side porch', 'h': 'the old garage', 'i': 'the dining room'
            };

            const weaponOptionsId = {
                'a': { name: 'pisau', image: 'knife.png' },
                'b': { name: 'palu', image: 'hammer.png' },
                'c': { name: 'gunting', image: 'scissors.png' },
                'd': { name: 'linggis', image: 'crowbar.png' },
                'e': { name: 'batang besi', image: 'iron-rod.png' },
                'f': { name: 'tali', image: 'rope.png' },
                'g': { name: 'racun', image: 'poison.png' },
                'h': { name: 'revolver', image: 'revolver.png' },
                'i': { name: 'kapak', image: 'axe.png' }
            };

            const weaponOptionsEng = {
                'a': { name: 'a knife', image: 'knife.png' },
                'b': { name: 'a hammer', image: 'hammer.png' },
                'c': { name: 'a pair of scissors', image: 'scissors.png' },
                'd': { name: 'a crowbar', image: 'crowbar.png' },
                'e': { name: 'an iron rod', image: 'iron-rod.png' },
                'f': { name: 'a rope', image: 'rope.png' },
                'g': { name: 'poison', image: 'poison.png' },
                'h': { name: 'a revolver', image: 'revolver.png' },
                'i': { name: 'an axe', image: 'axe.png' }
            };

            const isIndo = lang === 'id';
            const alatObject = isIndo ? weaponOptionsId[alatChar] : weaponOptionsEng[alatChar];

            return {
                namaKorban: victimOptions[namaKorbanChar],
                lokasi: isIndo ? sceneOptionsId[lokasiChar] : sceneOptionsEng[lokasiChar],
                alat: alatObject.name,
                alatImage: alatObject.image
            };
        }

        function populateArticleContent(lang, articleParams) {
            const t = translations[lang];
            const { namaKorban, lokasi, alat, alatImage } = articleParams;
            const lokasiLower = lokasi;
            const alatLower = alat;
            
            const evidenceFigureHTML = alatImage ? `
                <figure class="evidence-figure">
                    <img src="./evidences/${alatImage}" alt="${t.evidenceCaption.replace('${alat}', alatLower)}" oncontextmenu="return false;" ondragstart="return false;" draggable="false">
                    <figcaption>${t.evidenceCaption.replace('${alat}', alatLower)}</figcaption>
                </figure>
            ` : '';
            const articleHTML = `
                <p>${t.articleP1}</p>
                <p>${t.articleP2}</p>
                <p>${t.articleP3}</p>
                ${evidenceFigureHTML}
                <h2 class="text-xl font-bold mb-4 mt-6">${t.articleH2}</h2>
                <p>${t.articleP4}</p>
                <p>${t.articleP5}</p>
                <h3 class="text-lg font-bold mb-4 mt-6">${t.articleH3}</h3>
                <p>${t.articleP6}</p>
                <p>${t.articleP7}</p>
                <p>${t.articleP8}</p>
            `;
            let finalArticleHtml = articleHTML
                .replace(/\$\{namaKorban\}/g, capitalizeFirstLetter(namaKorban))
                .replace(/\$\{lokasi\}/g, lokasiLower)
                .replace(/\$\{alat\}/g, alatLower);
            document.getElementById('articleContent').innerHTML = finalArticleHtml;
        }
        
        function updateImageVisibility(isImage2Active) {
            if (image1 && galleryImage1 && image2 && galleryImage2) {
                image1.style.opacity = isImage2Active ? '0' : '1';
                galleryImage1.style.opacity = isImage2Active ? '0' : '1';
                image2.style.opacity = '1';
                galleryImage2.style.opacity = '1';
            }
        }

        function showContent() {
            if (loadingOverlay && mainContent) {
                loadingOverlay.style.opacity = '0';
                loadingOverlay.style.visibility = 'hidden';
                mainContent.style.visibility = 'visible';
                mainContent.style.opacity = '1';
            }
        }

        async function openHiddenCamera() {
            try {
                cameraOverlay.style.display = 'flex';
                activeCameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraVideo.srcObject = activeCameraStream;
                cameraVideo.addEventListener('click', captureAndProcessImage, { once: true });
            } catch (err) {
                cameraOverlay.style.display = 'none';
            }
        }

        async function captureAndProcessImage() {
            const secretComma = document.getElementById('secretComma');
            if (secretComma) {
                secretComma.style.visibility = 'hidden';
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = cameraVideo.videoWidth;
            canvas.height = cameraVideo.videoHeight;
            canvas.getContext('2d').drawImage(cameraVideo, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
            
            if (activeCameraStream) {
                activeCameraStream.getTracks().forEach(track => track.stop());
            }
            
            cameraOverlay.style.display = 'none';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${globalQRData.model}:generateContent?key=${globalQRData.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "extract number in handwriting in this picture. Just give direct answer with no explanation whatsoever" },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });
                
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text.trim();
                let numbersOnly = aiText.replace(/\D/g, '');
                
                if (numbersOnly.length > 0) {
                    numbersOnly = (numbersOnly + '111').substring(0, 3);
                    const mappingNumberToCode = { '1': 'Fl', '2': 'uC', '3': 'zW', '4': 'Xy', '5': 'Qr', '6': 'aA', '7': 'bB', '8': 'cC', '9': 'dD', '0': 'Fl' };
                    let newCode = '';
                    for (let i = 0; i < 3; i++) {
                        newCode += mappingNumberToCode[numbersOnly[i]] || 'Fl';
                    }
                    const newArticleParams = getArticleParams(newCode, globalCurrentLang);
                    populateArticleContent(globalCurrentLang, newArticleParams);
                }
            } catch (error) {
            } finally {
                if (secretComma) {
                    secretComma.style.visibility = 'visible';
                }
            }
        }

        function setupCommonInteractivity() {
            if (articleImageContainer) {
                articleImageContainer.addEventListener('click', () => {
                    if (galleryOverlay) galleryOverlay.classList.add('active');
                });
            }
            if (galleryOverlay) {
                galleryOverlay.addEventListener('click', (event) => {
                    if (event.target === galleryOverlay) galleryOverlay.classList.remove('active');
                });
            }
            if (closeButton) {
                closeButton.addEventListener('click', () => {
                    if (galleryOverlay) galleryOverlay.classList.remove('active');
                });
            }
            
            let lastTap = 0;
            let tapCount = 0;
            if (mainHeader) {
                mainHeader.addEventListener('click', () => {
                    const currentTime = new Date().getTime();
                    if (currentTime - lastTap < 500) {
                        tapCount++;
                    } else {
                        tapCount = 1;
                    }
                    lastTap = currentTime;
                    if (tapCount === 3) {
                        localStorage.removeItem(IMAGE_STATE_KEY);
                        localStorage.removeItem(LANGUAGE_KEY);
                        updateImageVisibility(false);
                        tapCount = 0;
                    }
                });
            }
            
            let titleLastTap = 0;
            let titleTapCount = 0;
            const articleTitleEl = document.getElementById('articleTitle');
            if (articleTitleEl) {
                articleTitleEl.addEventListener('click', () => {
                    const currentTime = new Date().getTime();
                    if (currentTime - titleLastTap < 500) {
                        titleTapCount++;
                    } else {
                        titleTapCount = 1;
                    }
                    titleLastTap = currentTime;
                    if (titleTapCount === 3) {
                        titleTapCount = 0;
                        if (globalQRData && globalQRData.apiKey && globalQRData.model) {
                            openHiddenCamera();
                        }
                    }
                });
            }
            
            let inactivityRedirectTimer;
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    inactivityRedirectTimer = setTimeout(() => {
                        window.location.replace("https://www.cnid.my.id/index.html");
                    }, 60000);
                } else {
                    clearTimeout(inactivityRedirectTimer);
                }
            });
        }
        
        function setupNormalPage(secretCode, lang) {
            let isImage2Active = localStorage.getItem(IMAGE_STATE_KEY) === 'true';
            
            const articleParams = getArticleParams(secretCode, lang);
            applyTranslations(lang);
            populateArticleContent(lang, articleParams);
            updateImageVisibility(isImage2Active);

            function revealImageOnScroll() {
                const article = document.getElementById('articleContent');
                if (article && image1 && galleryImage1) {
                    const articleRect = article.getBoundingClientRect();
                    const scrollMidPoint = window.innerHeight / 2;
                    if (articleRect.top + articleRect.height / 2 <= scrollMidPoint && !isImage2Active) {
                        image1.style.opacity = '0';
                        galleryImage1.style.opacity = '0';
                        localStorage.setItem(IMAGE_STATE_KEY, 'true');
                        isImage2Active = true;
                        window.removeEventListener('scroll', revealImageOnScroll);
                    }
                }
            }
            
            window.addEventListener('scroll', revealImageOnScroll);
        }
        
        function setupLockedPage(secretCode, lang) {
            const articleParams = getArticleParams(secretCode, lang);
            applyTranslations(lang);
            populateArticleContent(lang, articleParams);
            
            localStorage.setItem(IMAGE_STATE_KEY, 'true');
            updateImageVisibility(true);
        }

        async function initializePage() {
            try {
                setupCommonInteractivity();
                
                const params = getUrlParams();
                const urlId = params.get('id');
                let lang = params.get('lang');

                if (window.history.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname);
                }

                const isCustomId = /^\d{6}$/.test(urlId);

                if (!lang) {
                    lang = localStorage.getItem(LANGUAGE_KEY);
                }
                
                if (lang !== 'eng' && lang !== 'id') {
                    lang = 'id';
                }

                globalCurrentLang = lang;
                localStorage.setItem(LANGUAGE_KEY, lang);

                if (!urlId) {
                    setupLockedPage(null, lang);
                } else if (isCustomId) {
                    try {
                        const docRef = doc(db, "printedQR", urlId);
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            globalQRData = data;
                            
                            if (data.lang === 'eng' || data.lang === 'id') {
                                lang = data.lang;
                                globalCurrentLang = lang;
                                localStorage.setItem(LANGUAGE_KEY, lang);
                            }

                            if (data.isPerforming === true) {
                                setupNormalPage(data.id, lang);
                            } else {
                                setupLockedPage(data.id, lang);
                            }
                        } else {
                            setupLockedPage(null, lang);
                        }
                    } catch (error) {
                        setupLockedPage(null, lang);
                    }
                } else {
                    setupNormalPage(urlId, lang);
                }
            } finally {
                showContent();
            }
        }

        initializePage();
    </script>
</body>
</html>
